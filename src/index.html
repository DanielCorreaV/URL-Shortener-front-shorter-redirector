<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace — SHRTN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#f8fafc] text-slate-900 min-h-screen flex flex-col">

    <header
        class="bg-white border-b border-slate-200 sticky top-0 z-40 h-16 flex items-center justify-between px-6 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-2 rounded-xl shadow-sm">
                <i data-lucide="columns-3" class="w-5 h-5"></i>
            </div>
            <span class="text-lg font-bold tracking-tight text-slate-900">SHRTN <span
                    class="text-indigo-600 font-medium">Console</span></span>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex items-center gap-3 border-r border-slate-200 pr-4">
                <div class="w-8 h-8 rounded-full bg-indigo-100 border border-indigo-200 flex items-center justify-center text-indigo-700 text-xs font-bold uppercase"
                    id="userAvatar">--</div>
                <div class="text-left">
                    <p id="userProfileName" class="text-xs font-bold text-slate-800">...</p>
                    <p class="text-[10px] text-emerald-600 font-semibold tracking-wide uppercase">Workspace Activo</p>
                </div>
            </div>
            <button onclick="logout()" class="text-slate-400 hover:text-red-500 transition-colors"
                title="Cerrar sesión">
                <i data-lucide="log-out" class="w-4 h-4"></i>
            </button>
        </div>
    </header>

    <div class="flex flex-col md:flex-row flex-grow w-full max-w-[1600px] mx-auto">
        <aside
            class="w-full md:w-80 bg-white border-b md:border-b-0 md:border-r border-slate-200 p-5 shrink-0 flex flex-col h-[calc(100vh-4rem)] sticky top-16">
            <div class="flex items-center justify-between mb-4 px-1">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Tus Enlaces</span>
                <span
                    class="text-[10px] bg-indigo-50 text-indigo-600 font-bold px-2 py-0.5 rounded-full border border-indigo-100">Sincronizado</span>
            </div>

            <button onclick="redirectToStats()"
                class="mb-4 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs font-semibold p-3 rounded-xl flex items-center justify-center gap-2 transition-all border border-indigo-100 shadow-sm">
                <i data-lucide="bar-chart-3" class="w-4 h-4"></i>
                <span>Ir al Panel de Estadísticas</span>
            </button>

            <div id="userLinksSidebar" class="flex-grow overflow-y-auto space-y-1.5 pr-1"></div>
        </aside>

        <main class="flex-grow p-6 lg:p-8 space-y-6 flex flex-col justify-center items-center min-h-[500px]">
            <section class="bg-white border border-slate-200 p-8 rounded-2xl shadow-sm w-full max-w-2xl">
                <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4 flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-4 h-4 text-indigo-500"></i> Acortar nueva URL destino
                </h3>
                <form id="createShortenerForm" onsubmit="handleCreateLink(event)"
                    class="flex flex-col sm:flex-row gap-3">
                    <div class="relative flex-grow">
                        <i data-lucide="link-2" class="w-4 h-4 text-slate-400 absolute left-3.5 top-3.5"></i>
                        <input type="url" id="longUrlInput" required
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:border-indigo-500 focus:bg-white transition-all"
                            placeholder="https://ejemplo.com/ejemplo">
                    </div>
                    <button type="submit"
                        class="bg-slate-900 hover:bg-slate-800 text-white font-semibold text-sm px-6 py-3 rounded-xl transition-all flex items-center justify-center gap-2 shrink-0">
                        <span>Generar Link</span>
                        <i data-lucide="sparkles" class="w-4 h-4 text-amber-400"></i>
                    </button>
                </form>
            </section>

            <div id="successCard"
                class="hidden w-full max-w-2xl bg-emerald-50 border border-emerald-200 p-4 rounded-xl flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-emerald-500 text-white p-2 rounded-lg"><i data-lucide="check" class="w-4 h-4"></i>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-emerald-800">¡Enlace creado!</p>
                        <p id="generatedUrlText" class="text-xs font-mono text-emerald-600 mt-0.5"></p>
                    </div>
                </div>
                <button onclick="copyGeneratedUrl()"
                    class="text-emerald-700 hover:bg-emerald-100 p-2 rounded-lg transition-colors">
                    <i data-lucide="copy" class="w-4 h-4"></i>
                </button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
